name: CI

on:
  push:
  pull_request:

jobs:
  static-checks:
    name: Static site checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm test
